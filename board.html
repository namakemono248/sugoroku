<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凄録（スゴロク） - 盤面</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-banner {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        /* 盤面の外枠コンテナ */
        .board-container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border: 6px solid #000000;
            border-radius: 12px;
            padding: 40px 20px;
            box-sizing: border-box;
            box-shadow: 8px 8px 0px #000000;
            display: flex;
            flex-direction: column;
            gap: 0px; /* 行ごとの隙間をなくして密着させる */
        }

        /* 右上の「記録へ」ボタン */
        .header-actions {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .nav-button {
            border: 3px solid #000000;
            background-color: #ffffff;
            padding: 6px 16px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
        }

        /* すごろくの「行」：1行に5マス並べる */
        .board-row {
            display: flex;
            width: 100%;
        }

        /* 偶数行は右から左へ逆配置にする（CSSのrow-reverseで蛇行を表現！） */
        .board-row.reverse {
            flex-direction: row-reverse;
        }

        /* マスの基本スタイル */
        .grid-cell {
            flex: 1;
            aspect-ratio: 1 / 1; /* 正方形にする */
            border: 4px solid #000000;
            margin: -2px; /* 枠線が重なって太くなるのを防ぐ */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .grid-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        /* イラストのグラデーション配色を再現 */
        .status-very-good { background-color: #ff8c00; color: #000000; }
        .status-good      { background-color: #ffb74d; color: #000000; }
        .status-so-so     { background-color: #ffe0b2; color: #000000; }
        .status-normal    { background-color: #ffffff; color: #000000; }
        .status-bad-hint  { background-color: #c5cae9; color: #000000; }
        .status-bad       { background-color: #5c6bc0; color: #ffffff; }
        .status-very-bad  { background-color: #1a237e; color: #ffffff; }

        /* 空白埋め用のダミーマスの色（まだ記録がない未来のマス） */
        .status-empty     { background-color: #e0e0e0; color: #9e9e9e; border-style: dashed; }

        .cell-date {
            font-size: 12px;
            margin-bottom: 4px;
            border-bottom: 1px solid currentColor;
        }
        .cell-comment {
            font-size: 11px;
            display: -webkit-box;
            -webkit-line-clamp: 2; /* 2行まで表示して溢れたら…にする */
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <a href="index.html" class="nav-button">＜ 記録ページへ</a>
    </div>

    <div class="title-banner">
        🎲 <span id="userNameDisplay">ゲスト</span> のすごろくマップ
    </div>

    <div class="board-container" id="board"></div>

    <script>
        window.onload = function() {
    // ユーザー名の表示
    const storedName = localStorage.getItem('sugoroku_username') || "プレイヤー1";
    document.getElementById('userNameDisplay').textContent = storedName;

    // データの読み込み
    const records = JSON.parse(localStorage.getItem('sugoroku_records')) || [];
    const board = document.getElementById('board');

    // 1. 各ステータスが「何マス進む（何マス分表示する）か」を定義する
    const stepMap = {
        'very-good': 3,  // かなりできた => 3マス
        'good': 2,       // できた => 2マス
        'so-so': 1,      // すこしでき => 1マス
        'normal': 1,     // ふつう => 1マス
        'bad-hint': 1,   // すこし失敗 => 1マス
        'bad': 2,        // 失敗 => 1マス
        'very-bad': 3    // かなり失敗 => 1マス
    };

    // 2. 実際の記録データから、進むマス数に応じて「マスの配列」を新しく作り直す
    let finalCellsData = [];
    
    records.forEach(data => {
        // そのステータスに応じたマスの数だけ、同じデータを配列に複製して突っ込む
        const steps = stepMap[data.status] || 1;
        for (let s = 0; s < steps; s++) {
            // 2マス目以降はコメントが連続するとうるさいので、最初の1マス目だけ日付とコメントを出す工夫
            finalCellsData.push({
                date: data.date,
                comment: s === 0 ? data.comment : "（トコトコ…）", // 2マス目以降の文字
                status: data.status,
                isMainCell: s === 0,
                fullComment: data.comment // ポップアップ用
            });
        }
    });

    // 最低でも15マス（3行分）は盤面を表示するためのダミー処理
    const displayCount = Math.max(finalCellsData.length, 15);
    let currentRow = null;
    
    for (let i = 0; i < displayCount; i++) {
        // 5マスごとに新しい「行（Row）」を作成する
        if (i % 5 === 0) {
            currentRow = document.createElement('div');
            currentRow.className = 'board-row';
            
            // 偶数行は逆向き(右から左)にする
            if (Math.floor(i / 5) % 2 === 1) {
                currentRow.classList.add('reverse');
            }
            board.appendChild(currentRow);
        }

        // マス目（Cell）の作成
        const cell = document.createElement('div');
        
        if (i < finalCellsData.length) {
            // データがあるマス
            const cellData = finalCellsData[i];
            cell.className = `grid-cell status-${cellData.status}`;
            
            // 日付のフォーマット（月/日）
            const dateObj = new Date(cellData.date);
            const dateText = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
            
            // 最初のマスだけ日付をちゃんと出す
            const displayDate = cellData.isMainCell ? dateText : "進む";
            
            cell.innerHTML = `
                <div class="cell-date">${displayDate}</div>
                <div class="cell-comment">${cellData.comment}</div>
            `;
            
            // クリックしたら詳細をポップアップ
            cell.onclick = function() {
                alert(`【${cellData.date}の記録】\n\n${cellData.fullComment}`);
            };
        } else {
            // データがない未来のダミーマス
            cell.className = 'grid-cell status-empty';
            cell.innerHTML = `<div class="cell-date">??</div><div class="cell-comment">これからの未来</div>`;
        }

        currentRow.appendChild(cell);
    }
};
    </script>
</body>
</html>
