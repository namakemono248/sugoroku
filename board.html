<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>凄録（スゴロク） - 盤面</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #f9f9f9;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title-banner {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
        }

        .board-container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border: 6px solid #000000;
            border-radius: 12px;
            padding: 40px 20px;
            box-sizing: border-box;
            box-shadow: 8px 8px 0px #000000;
            display: flex;
            flex-direction: column; /* 上から下に要素（行）が並ぶ */
        }

        .header-actions {
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }
        .nav-button {
            border: 3px solid #000000;
            background-color: #ffffff;
            padding: 6px 16px;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            color: #000000;
        }

        .board-row {
            display: flex;
            width: 100%;
        }

        .grid-cell {
            flex: 1;
            aspect-ratio: 1 / 1;
            border: 4px solid #000000;
            margin: -2px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 8px;
            box-sizing: border-box;
            font-weight: bold;
            font-size: 14px;
            text-align: center;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .grid-cell:hover {
            transform: scale(1.05);
            z-index: 10;
        }

        /* スタートマスの特別な見た目 */
        .status-start {
            background-color: #ffeb3b;
            color: #000000;
            border: 5px double #000000;
        }

        .status-very-good { background-color: #ff8c00; color: #000000; }
        .status-good      { background-color: #ffb74d; color: #000000; }
        .status-so-so     { background-color: #ffe0b2; color: #000000; }
        .status-normal    { background-color: #ffffff; color: #000000; }
        .status-bad-hint  { background-color: #c5cae9; color: #000000; }
        .status-bad       { background-color: #5c6bc0; color: #ffffff; }
        .status-very-bad  { background-color: #1a237e; color: #ffffff; }
        .status-empty     { background-color: #e0e0e0; color: #9e9e9e; border-style: dashed; }

        .cell-date {
            font-size: 12px;
            margin-bottom: 4px;
            border-bottom: 1px solid currentColor;
        }
        .cell-comment {
            font-size: 11px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>

    <div class="header-actions">
        <a href="index.html" class="nav-button">＜ 記録ページへ</a>
    </div>

    <div class="title-banner">
        🎲 <span id="userNameDisplay">ゲスト</span> のすごろくマップ
    </div>

    <div class="board-container" id="board"></div>

    <script>
        window.onload = function() {
            document.getElementById('userNameDisplay').textContent = localStorage.getItem('sugoroku_username') || "プレイヤー1";

            const records = JSON.parse(localStorage.getItem('sugoroku_records')) || [];
            const board = document.getElementById('board');

            const stepMap = {
                'very-good': 3,
                'good': 2,
                'so-so': 1,
                'normal': 1,
                'bad-hint': 1,
                'bad': 1,
                'very-bad': 1
            };

            // 1. スタートマス「S」を配列の先頭に固定で用意する
            let finalCellsData = [{
                dateLabel: "START",
                comment: "🏁 S",
                status: "start",
                fullComment: "ここからスタート！",
                fullDate: "ゲーム開始"
            }];
            
            let lastProcessedDate = ""; 

            // 2. データをマスの配列に展開する
            records.forEach(data => {
                const steps = stepMap[data.status] || 1;
                let isSameDayCount = (data.date === lastProcessedDate);
                lastProcessedDate = data.date;

                const dateObj = new Date(data.date);
                let dateText = `${dateObj.getMonth() + 1}/${dateObj.getDate()}`;
                if (isSameDayCount) {
                    dateText += "+";
                }

                for (let s = 0; s < steps; s++) {
                    finalCellsData.push({
                        dateLabel: s === 0 ? dateText : "トコトコ",
                        comment: s === 0 ? data.comment : "👣",
                        status: data.status,
                        fullComment: data.comment,
                        fullDate: data.date
                    });
                }
            });

            // 最低でも15マス（3行分：1行5マス）にする
            const totalCellsNeeded = Math.max(finalCellsData.length, 15);
            // 5マスずつ区切るための総行数を計算
            const totalRows = Math.ceil(totalCellsNeeded / 5);

            // 3. 【重要】下から上に登らせるための2次元グリッドの空枠作成
            let grid = [];
            for (let r = 0; r < totalRows; r++) {
                grid.push(new Array(5).fill(null));
            }

            // 4. クネクネ蛇行（右下からスタートして上へ向かう）のロジックで配置
            // 蛇行パターン：下から数えて 0行目は右から左、1行目は左から右、2行目は右から左...
            let currentCellIndex = 0;
            for (let r = 0; r < totalRows; r++) {
                if (r % 2 === 0) {
                    // 下から数えて偶数行（0, 2, 4...）：右端から左端へ詰める (4, 3, 2, 1, 0)
                    for (let c = 4; c >= 0; c--) {
                        if (currentCellIndex < finalCellsData.length) {
                            grid[r][c] = finalCellsData[currentCellIndex];
                        }
                        currentCellIndex++;
                    }
                } else {
                    // 下から数えて奇数行（1, 3, 5...）：左端から右端へ詰める (0, 1, 2, 3, 4)
                    for (let c = 0; c < 5; c++) {
                        if (currentCellIndex < finalCellsData.length) {
                            grid[r][c] = finalCellsData[currentCellIndex];
                        }
                        currentCellIndex++;
                    }
                }
            }

            // 5. HTMLへの描画（HTMLは「上の行」から順に出力する必要があるので、配列を逆順（上から）ループする）
            for (let r = totalRows - 1; r >= 0; r--) {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'board-row';

                for (let c = 0; c < 5; c++) {
                    const cellDiv = document.createElement('div');
                    const cellData = grid[r][c];

                    if (cellData) {
                        // 記録データまたはSマスがある場合
                        cellDiv.className = `grid-cell status-${cellData.status}`;
                        cellDiv.innerHTML = `
                            <div class="cell-date">${cellData.dateLabel}</div>
                            <div class="cell-comment">${cellData.comment}</div>
                        `;
                        cellDiv.onclick = function() {
                            alert(`【${cellData.fullDate}】\n\n${cellData.fullComment}`);
                        };
                    } else {
                        // まだ到達していない未来の空マス
                        cellDiv.className = 'grid-cell status-empty';
                        cellDiv.innerHTML = `
                            <div class="cell-date">??</div>
                            <div class="cell-comment">これからの未来</div>
                        `;
                    }
                    rowDiv.appendChild(cellDiv);
                }
                board.appendChild(rowDiv);
            }
        };
    </script>
</body>
</html>
